apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: app1-allow-intra-ns-and-specific-ips-2
  namespace: app1
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector: {}
    - ipBlock:
        cidr: 1.1.1.1/32
    - ipBlock:
        cidr: 8.8.4.4/32
    - ipBlock:
        cidr: 8.8.8.8/32
  egress:
  - to:
    - podSelector: {}
    - ipBlock:
        cidr: 1.1.1.1/32
    - ipBlock:
        cidr: 8.8.4.4/32
    - ipBlock:
        cidr: 8.8.8.8/32
